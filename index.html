};

const processCSV = (text) => {
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  if (!lines.length) return [];
  const sep = lines[0].includes("\t")?"\t":";";
  const headers = lines[0].split(sep).map(h=>h.trim().toLowerCase());
  const col = n => headers.indexOf(n.toLowerCase());
  const iCodExp=col("codexp"), iSrv=col("codservicio"), iNomb=col("nombdst"), iDir=col("dirdst"), iCp=col("cpdst"), iLoc=col("localidaddst");
  const iEstado=col("eventocodigo")!==-1?col("eventocodigo"):col("eventcodigo");
  const iBultos=col("bultos"), iKilos=col("kilos"), iObserv=col("observ");
  const iFP=(()=>{for(const n of["fprevientrega","fpreventrega","fprev","fentrega"]){const i=headers.findIndex(h=>h.replace(/[^a-z]/g,"").includes(n.replace(/[^a-z]/g,"")));if(i!==-1)return i;}return -1;})();
  const out=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(sep).map(x=>x.trim());
    const id=iCodExp!==-1?c[iCodExp]:""; if(!id||id.length<3) continue;
    const srvCode=String(iSrv!==-1?c[iSrv]:"");
    const srvInfo=SERVICE_MAP[srvCode]||{label:srvCode||"STD",color:"#64748b",premium:false};
    const estadoRaw=iEstado!==-1?parseInt(c[iEstado]):6;
    const nota=iObserv!==-1?c[iObserv]:"";
    const cp=iCp!==-1?c[iCp]:"00000";
    out.push({id,conductor:assignDriver(cp),cliente:iNomb!==-1?c[iNomb]:"DEST",direccion:iDir!==-1?c[iDir]:"SIN DIR.",localidad:iLoc!==-1?c[iLoc]:"LOCALIDAD",cp,estado:isNaN(estadoRaw)?6:estadoRaw,bultos:iBultos!==-1?parseInt(c[iBultos])||1:1,kgs:iKilos!==-1?parseFloat(c[iKilos])||0:0,fPrevista:iFP!==-1?c[iFP]:"--/--/--",srvCode,srvLabel:srvInfo.label,srvColor:srvInfo.color,isPremium:srvInfo.premium,nota,tieneNota:nota.length>2});
  }
  return out;
};

// Todas las llamadas a n8n van por el proxy PHP (evita CORS)
const proxyFetch = url => fetch(`/n8n-proxy.php?url=${encodeURIComponent(url)}`);

const isUrgent = fp => {
  if(!fp||fp==="--/--/--") return false;
  const p=fp.split("/"); if(p.length<3) return false;
  const [d,m,y]=p; const year=y.length===2?"20"+y:y;
  const dt=new Date(parseInt(year),parseInt(m)-1,parseInt(d));
  const now=new Date(); now.setHours(0,0,0,0); return dt<=now;
};

function App() {
  const [view,setView]=useState("dashboard");
  const [data,setData]=useState([]);
  const [search,setSearch]=useState("");
  const [selDriver,setSelDriver]=useState("TODOS");
  const [selStatus,setSelStatus]=useState(null);
  const [detailItem,setDetailItem]=useState(null);
  const [noteText,setNoteText]=useState(null);
  const [page,setPage]=useState(1);
  const [showUpload,setShowUpload]=useState(false);
  const [n8nStatus,setN8nStatus]=useState(null);
  const [n8nUrl,setN8nUrl]=useState(()=>{try{return localStorage.getItem("n8n_url")||"";}catch(e){return "";}});
  const [n8nLoading,setN8nLoading]=useState(false);
  const [n8nError,setN8nError]=useState("");
  const [n8nLog,setN8nLog]=useState([]);
  const [showN8nConfig,setShowN8nConfig]=useState(false);
  const [messages,setMessages]=useState([{role:"assistant",text:"Sistema listo. Carga datos desde n8n o CSV para comenzar."}]);
  const [chatInput,setChatInput]=useState("");
  const [isTyping,setIsTyping]=useState(false);
  const [aiInsight,setAiInsight]=useState("");
  const [analyzing,setAnalyzing]=useState(false);
  const chatEndRef=useRef(null);
  const pollRef=useRef(null);
  const PER_PAGE=12;

  const addLog=(msg,type="info")=>setN8nLog(prev=>[{ts:new Date().toLocaleTimeString("es-ES"),msg,type},...prev].slice(0,50));
  const saveN8nUrl=url=>{setN8nUrl(url);try{localStorage.setItem("n8n_url",url);}catch(e){}};

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  const pullAllSheets=async()=>{
    if(!n8nUrl){setShowN8nConfig(true);return;}
    setN8nLoading(true);setN8nError("");addLog("Conectando con GLS Atlas vía n8n...");
    try{
      addLog(`GET ${n8nUrl}/webhook/gls-excel`);
      const r=await proxyFetch(`${n8nUrl}/webhook/gls-excel`);
      if(!r.ok) throw new Error(`HTTP ${r.status} — ${r.statusText}`);
      const rd=await r.json();
      const allEnvios=rd.envios||[];
      if(rd.errores&&rd.errores.length) rd.errores.forEach(err=>addLog(`⚠ ${err.dealer||err.sheetCode}: ${err.error||err.info}`,"error"));
      addLog(`✓ ${rd.hojas||'?'} hojas descargadas — ${allEnvios.length} envíos`,"ok");
      if(!allEnvios.length) throw new Error("Sin expediciones. Comprueba credenciales GLS_USER/GLS_PASS en n8n.");
      setData(prev=>{const m=new Map([...prev,...allEnvios].map(x=>[x.id,x]));return[...m.values()];});
      setN8nStatus("ok");setPage(1);
      addLog(`✓ Total: ${allEnvios.length} expediciones cargadas`,"ok");
    }catch(e){
      setN8nStatus("err");
      setN8nError(e.message||"Error desconocido");
      addLog(`✗ ${e.message}`,"error");
    }
    setN8nLoading(false);
  };

  const pullEstados=async()=>{
    if(!n8nUrl||!data.length) return;
    try{
      const r=await proxyFetch(`${n8nUrl}/webhook/gls-estados`);
      if(!r.ok) return;
      const updates=await r.json();
      if(!Array.isArray(updates)||!updates.length) return;
      setData(prev=>{const m=new Map(prev.map(x=>[x.id,x]));updates.forEach(u=>{if(m.has(u.codexp))m.set(u.codexp,{...m.get(u.codexp),estado:parseInt(u.eventoCodigo)||6});});return[...m.values()];});
      setN8nStatus("ok");addLog(`✓ Estados actualizados: ${updates.length}`,"ok");
    }catch(e){}
  };

  useEffect(()=>{
    if(pollRef.current) clearInterval(pollRef.current);
    if(n8nUrl) pollRef.current=setInterval(pullEstados,10*60*1000);
    return()=>{if(pollRef.current)clearInterval(pollRef.current);};
  },[n8nUrl,data.length]);

  // Recibir datos desde n8n via webhook POST directo al dashboard
  useEffect(()=>{
    const handler=e=>{
      if(!e.data?.type) return;
      if(e.data.type==="gls-incoming"){
        const processed=(e.data.payload||[]).map(r=>{
          const srvCode=String(r.codservicio||"");
          const srvInfo=SERVICE_MAP[srvCode]||{label:srvCode||"STD",color:"#64748b",premium:false};
          return{id:r.codexp,conductor:r.conductor||assignDriver(r.cpdst),cliente:r.nombdst||"DEST",direccion:r.dirdst||"SIN DIR.",localidad:r.localidaddst||"LOCALIDAD",cp:r.cpdst||"00000",estado:parseInt(r.eventoCodigo)||6,bultos:parseInt(r.bultos)||1,kgs:parseFloat(r.kilos)||0,fPrevista:r.fpreviEntrega||"--/--/--",srvCode,srvLabel:srvInfo.label,srvColor:srvInfo.color,isPremium:srvInfo.premium,nota:r.observ||"",tieneNota:(r.observ||"").length>2};
        });
        setData(prev=>{const m=new Map([...prev,...processed].map(x=>[x.id,x]));return[...m.values()];});
        setN8nStatus("ok");setPage(1);
        addLog(`✓ ${processed.length} expediciones recibidas`,"ok");
      }
      if(e.data.type==="update-estados"){
        const updates=e.data.payload||[];
        if(!updates.length) return;
        setData(prev=>{const m=new Map(prev.map(x=>[x.id,x]));updates.forEach(u=>{if(m.has(u.codexp))m.set(u.codexp,{...m.get(u.codexp),estado:parseInt(u.eventoCodigo)||6});});return[...m.values()];});
        setN8nStatus("ok");
      }
    };
    window.addEventListener("message",handler);
    return()=>window.removeEventListener("message",handler);
  },[]);

  const filtered=useMemo(()=>data.filter(d=>{
    const ms=[d.id,d.cliente,d.direccion,d.srvLabel].some(v=>String(v).toLowerCase().includes(search.toLowerCase()));
    const md=selDriver==="TODOS"||d.conductor===selDriver;
    const mst=selStatus===null||d.estado===selStatus;
    return ms&&md&&mst;
  }),[data,search,selDriver,selStatus]);

  const kpi=useMemo(()=>{
    const t=filtered.length;
    return{total:t,ok:filtered.filter(d=>d.estado===7).length,premium:filtered.filter(d=>d.isPremium).length,err:filtered.filter(d=>d.estado===9).length,rate:t?Math.round(filtered.filter(d=>d.estado===7).length/t*100):0};
  },[filtered]);

  const driverStats=useMemo(()=>{
    const s={};
    ALL_HEADERS.forEach(n=>s[n]={total:0,ok:0,alerts:0,premium:0,kgs:0});
    data.forEach(d=>{if(s[d.conductor]){s[d.conductor].total++;s[d.conductor].kgs+=d.kgs||0;if(d.estado===7)s[d.conductor].ok++;if(d.estado===9)s[d.conductor].alerts++;if(d.isPremium)s[d.conductor].premium++;}});
    return s;
  },[data]);

  const totalPages=Math.ceil(filtered.length/PER_PAGE)||1;
  const paged=filtered.slice((page-1)*PER_PAGE,page*PER_PAGE);

  const handleImport=newData=>{
    setData(prev=>{const m=new Map([...prev,...newData].map(x=>[x.id,x]));return[...m.values()];});
    setPage(1);
  };

  const handleChat=async()=>{
    if(!chatInput.trim()) return;
    const q=chatInput;setChatInput("");setIsTyping(true);
    setMessages(prev=>[...prev,{role:"user",text:q}]);
    const snap={};
    [...DRIVERS,...SECTIONS].forEach(n=>{const dd=data.filter(d=>d.conductor===n);if(dd.length)snap[n]={total:dd.length,incidencias:dd.filter(d=>d.estado===9).length,urgentes:dd.filter(d=>isUrgent(d.fPrevista)).length,ids:dd.map(d=>d.id)};});
    const sys=`Eres controlador logístico GLS Cáceres. Datos: ${JSON.stringify(snap)}\nRepartidores: ${[...DRIVERS,...SECTIONS].join(", ")}\nPara reasignar usa: <ACCION>{"tipo":"reasignar","expediciones":["ID1"],"destino":"NOMBRE"}</ACCION>\nResponde en español, conciso.`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:sys,messages:[{role:"user",content:q}]})});
      const res=await r.json();
      const fullText=res.content?.[0]?.text||"Sin respuesta.";
      const am=fullText.match(/<ACCION>([\s\S]*?)<\/ACCION>/);
      const tl=fullText.replace(/<ACCION>[\s\S]*?<\/ACCION>/g,"").trim();
      if(am){
        try{
          const ac=JSON.parse(am[1]);
          if(ac.tipo==="reasignar"&&ac.expediciones?.length&&ac.destino){
            setData(prev=>prev.map(d=>ac.expediciones.includes(d.id)?{...d,conductor:ac.destino.toUpperCase()}:d));
            setMessages(prev=>[...prev,{role:"assistant",text:tl,accion:{count:ac.expediciones.length,destino:ac.destino}}]);
          }else setMessages(prev=>[...prev,{role:"assistant",text:tl}]);
        }catch{setMessages(prev=>[...prev,{role:"assistant",text:tl}]);}
      }else setMessages(prev=>[...prev,{role:"assistant",text:tl}]);
    }catch(e){setMessages(prev=>[...prev,{role:"assistant",text:"Error de conexión con la API."}]);}
    setIsTyping(false);
  };

  const doAnalysis=async()=>{
    if(!data.length) return;
    setAnalyzing(true);
    const detail=DRIVERS.map(n=>{const dd=data.filter(d=>d.conductor===n);return{repartidor:n,total:dd.length,entregados:dd.filter(d=>d.estado===7).length,incidencias:dd.filter(d=>d.estado===9).length,kgs:+(dd.reduce((a,d)=>a+(d.kgs||0),0)).toFixed(1)};}).filter(d=>d.total>0);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,messages:[{role:"user",content:`Analiza estos datos de reparto GLS Cáceres. Dame 3 secciones: DIAGNÓSTICO, RECOMENDACIONES y MEJORAS APP. Datos: ${JSON.stringify(detail)}. Responde en español, con nombres específicos.`}]})});
      const res=await r.json();
      setAiInsight(res.content?.[0]?.text||"Análisis completado.");
    }catch(e){setAiInsight("Error al generar análisis.");}
    setAnalyzing(false);
  };

  const StatusBadge=({estado})=>{
    const s=ESTADO_MAP[estado]||{label:`COD ${estado}`,color:"#64748b"};
    return <span style={{padding:"0.25rem 0.75rem",borderRadius:"9999px",fontSize:"0.65rem",fontWeight:900,color:s.color,background:s.color+"22",border:`1px solid ${s.color}44`}}>{s.label}</span>;
  };

  const UploadModal=({onClose,onImport})=>{
    const [slots,setSlots]=useState([]);
    const [importing,setImporting]=useState(false);
    const addFiles=async files=>{
      const ns=[];
      for(const file of Array.from(files)){
        const isCSV=file.name.toLowerCase().endsWith(".csv");
        let count=0,csvText=null;
        if(isCSV){
          csvText=await new Promise(resolve=>{const r=new FileReader();r.onload=ev=>resolve(ev.target.result);r.readAsText(file,"latin1");});
          count=Math.max(0,csvText.split(/\r?\n/).filter(l=>l.trim()).length-1);
        }
        ns.push({file,fileName:file.name,csvText,isCSV,count});
      }
      setSlots(prev=>{const ex=new Set(prev.map(s=>s.fileName));return[...prev,...ns.filter(s=>!ex.has(s.fileName))];});
    };
    const handleImport=async()=>{
      setImporting(true);
      const all=[];
      for(const s of slots) if(s.isCSV) all.push(...processCSV(s.csvText));
      onImport(all);setImporting(false);onClose();
    };
    const total=slots.reduce((a,s)=>a+s.count,0);
    return(
      <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(10px)"}} onClick={onClose}/>
        <div style={{position:"relative",width:"100%",maxWidth:580,background:"#0a0a12",border:"1px solid #1e293b",borderRadius:"2rem",overflow:"hidden"}}>
          <div style={{padding:"1.5rem 2rem",borderBottom:"1px solid #1e293b",display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(0,0,0,0.3)"}}>
            <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
              <div style={{padding:"0.625rem",background:"#4f46e5",borderRadius:"0.875rem"}}><Ico d={ICONS.upload} size={20} color="white"/></div>
              <div>
                <h2 style={{fontSize:"1rem",fontWeight:900,color:"white",textTransform:"uppercase"}}>Cargar CSV</h2>
                <p style={{fontSize:"0.6rem",color:"#475569",fontWeight:700}}>Asignación automática por código postal</p>
              </div>
            </div>
            <button onClick={onClose} style={{padding:"0.5rem",borderRadius:"0.75rem",background:"rgba(255,255,255,0.05)",color:"#64748b"}}><Ico d={ICONS.x} size={18}/></button>
          </div>
          <div style={{padding:"1.25rem"}}>
            <div onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();addFiles(e.dataTransfer.files);}}
              style={{border:"2px dashed #1e293b",borderRadius:"1.5rem",padding:"2rem",textAlign:"center",cursor:"pointer"}}
              onClick={()=>document.getElementById("fui").click()}>
              <input id="fui" type="file" multiple accept=".csv" onChange={e=>addFiles(e.target.files)} style={{display:"none"}}/>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"0.75rem"}}>
                <div style={{padding:"1rem",background:"rgba(99,102,241,0.1)",borderRadius:"1rem"}}><Ico d={ICONS.upload} size={28} color="#6366f1"/></div>
                <p style={{fontSize:"0.8rem",fontWeight:800,color:"#94a3b8"}}>Arrastra archivos o <span style={{color:"#6366f1"}}>haz clic</span></p>
              </div>
            </div>
            {slots.length>0&&<div style={{marginTop:"1rem",display:"flex",flexDirection:"column",gap:"0.5rem"}}>
              {slots.map((s,i)=>(
                <div key={s.fileName} style={{display:"flex",alignItems:"center",gap:"0.75rem",background:"rgba(99,102,241,0.07)",border:"1px solid rgba(99,102,241,0.25)",borderRadius:"1rem",padding:"0.75rem 1rem"}}>
                  <Ico d={ICONS.file} size={16} color="#818cf8"/>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:"0.7rem",fontWeight:800,color:"white",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.fileName}</p>
                    <p style={{fontSize:"0.6rem",color:"#475569",fontWeight:700}}>{s.count} filas</p>
                  </div>
                  <button onClick={()=>setSlots(prev=>prev.filter((_,idx)=>idx!==i))} style={{padding:"0.375rem",borderRadius:"0.5rem",background:"rgba(239,68,68,0.1)"}}><Ico d={ICONS.trash} size={14} color="#ef4444"/></button>
                </div>
              ))}
            </div>}
          </div>
          <div style={{padding:"1rem 1.5rem",borderTop:"1px solid #1e293b",background:"rgba(0,0,0,0.3)",display:"flex",justifyContent:"flex-end",gap:"0.75rem"}}>
            <button onClick={onClose} style={{padding:"0.75rem 1.5rem",background:"rgba(255,255,255,0.05)",border:"1px solid #1e293b",borderRadius:"1rem",fontSize:"0.7rem",fontWeight:900,color:"#64748b"}}>Cancelar</button>
            <button onClick={handleImport} disabled={importing||!slots.length} style={{padding:"0.75rem 2rem",background:slots.length?"#4f46e5":"#1e293b",borderRadius:"1rem",fontSize:"0.7rem",fontWeight:900,color:"white",opacity:slots.length?1:0.4}}>
              {importing?"Importando…":`Importar (${total} exp.)`}
            </button>
          </div>
        </div>
      </div>
    );
  };

  const N8nView=()=>{
    const [localUrl,setLocalUrl]=useState(n8nUrl);
    const testCors=async()=>{
      // 1. Verificar que el proxy PHP está activo
      addLog("Comprobando proxy PHP...");
      try{
        const rp=await fetch("/n8n-proxy.php");
        const pd=await rp.json();
        if(pd.status==="ok") addLog(`✓ Proxy PHP activo — cURL: ${pd.curl}`,"ok");
        else addLog(`⚠ Proxy respondió pero estado: ${JSON.stringify(pd)}`,"error");
      }catch(e){addLog(`✗ Proxy PHP no encontrado (${e.message}) — ¿está n8n-proxy.php en el hosting?`,"error");return;}
      // 2. Verificar conexión con n8n
      if(!localUrl) return;
      addLog(`Probando conexión n8n → ${localUrl}/webhook/gls-excel`);
      try{
        const r=await fetch(`/n8n-proxy.php?url=${encodeURIComponent(localUrl+"/webhook/gls-excel")}`);
        addLog(`✓ n8n respondió HTTP ${r.status}`,"ok");
      }catch(e){addLog(`✗ Error: ${e.message}`,"error");}
    };
    const testIncoming=()=>{
      const mock=Array.from({length:5},(_,i)=>({codexp:`GLS${100000+i}`,codservicio:["96","0","37","98","1"][i],nombdst:`EMPRESA TEST ${i+1}`,dirdst:`C/ MAYOR ${i+10}`,localidaddst:["TRUJILLO","MIAJADAS","MONTÁNCHEZ","LOGROSÁN","GARCIAZ"][i],cpdst:["10200","10100","10170","10180","10250"][i],eventoCodigo:[6,6,7,6,9][i],bultos:1,kilos:2.5,fpreviEntrega:new Date().toLocaleDateString("es-ES"),observ:"",conductor:""}));
      window.dispatchEvent(new MessageEvent("message",{data:{type:"gls-incoming",payload:mock}}));
    };
    return(
      <div style={{maxWidth:860,margin:"0 auto",display:"flex",flexDirection:"column",gap:"1.5rem"}}>
        <div style={{background:"rgba(9,9,15,0.7)",border:"1px solid rgba(99,102,241,0.3)",borderRadius:"2rem",padding:"1.5rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1rem"}}>
            <div style={{padding:"0.625rem",background:"#4f46e5",borderRadius:"0.875rem"}}><Ico d={ICONS.settings} size={18} color="white"/></div>
            <div>
              <h2 style={{fontSize:"0.9rem",fontWeight:900,color:"white",textTransform:"uppercase"}}>URL de n8n</h2>
              <p style={{fontSize:"0.6rem",color:"#475569",fontWeight:700}}>URL base de tu instancia (sin barra final)</p>
            </div>
          </div>
          <div style={{display:"flex",gap:"0.75rem",marginBottom:"1rem"}}>
            <input type="text" value={localUrl} onChange={e=>setLocalUrl(e.target.value)} placeholder="https://n8n-n8n.qo5kbx.easypanel.host"
              style={{flex:1,background:"#0f172a",border:"1px solid #4f46e5",borderRadius:"1rem",padding:"0.75rem 1rem",fontSize:"0.8rem",fontWeight:700,color:"white",outline:"none"}}/>
            <button onClick={()=>{saveN8nUrl(localUrl.replace(/\/$/,""));addLog("✓ URL guardada","ok");}} style={{padding:"0.75rem 1.5rem",background:"#4f46e5",borderRadius:"1rem",fontSize:"0.7rem",fontWeight:900,color:"white"}}>Guardar</button>
            <button onClick={testCors} style={{padding:"0.75rem 1.25rem",background:"rgba(99,102,241,0.15)",border:"1px solid rgba(99,102,241,0.3)",borderRadius:"1rem",fontSize:"0.7rem",fontWeight:900,color:"#818cf8"}}>Test CORS</button>
          </div>
        </div>

        <div style={{background:"rgba(9,9,15,0.7)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:"2rem",padding:"1.5rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"1rem"}}>
            <Ico d={ICONS.alert} size={16} color="#ef4444"/>
            <h3 style={{fontSize:"0.65rem",fontWeight:900,color:"#ef4444",textTransform:"uppercase"}}>Variables de entorno — EasyPanel → n8n → Environment</h3>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
            {[["WEBHOOK_CORS_ALLOWED_ORIGINS","*"],["WEBHOOK_CORS_ALLOWED_METHODS","GET,HEAD,POST,PUT,DELETE,OPTIONS"],["WEBHOOK_CORS_ALLOWED_HEADERS","Content-Type,Authorization,X-Requested-With,Accept"],["N8N_EXPRESS_TRUST_PROXY","true"]].map(([k,v])=>(
              <div key={k} style={{display:"flex",gap:"0.75rem",alignItems:"center",background:"rgba(0,0,0,0.5)",borderRadius:"0.875rem",padding:"0.5rem 1rem",border:"1px solid #1e293b",fontFamily:"monospace"}}>

            {n8nLog.length===0

              :n8nLog.map((l,i)=>(

                  <span>{l.msg}</span>
                </div>
              ))
            }
          </div>
        </div>
      </div>
    );
  };

  return(

            <div style={{padding:"1.5rem"}}><p style={{color:"#94a3b8",fontSize:"0.82rem",lineHeight:1.6,fontStyle:"italic"}}>"{noteText}"</p></div>
            <div style={{padding:"1rem",display:"flex",justifyContent:"flex-end",background:"rgba(0,0,0,0.2)"}}>
              <button onClick={()=>setNoteText(null)} style={{padding:"0.5rem 1.5rem",background:"#f59e0b",color:"black",fontWeight:900,fontSize:"0.65rem",textTransform:"uppercase",borderRadius:"0.75rem"}}>Cerrar</button>
            </div>
          </div>
        </div>
      )}

      <footer style={{marginTop:"3rem",paddingTop:"1.5rem",borderTop:"1px solid #1e293b",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:"0.58rem",fontWeight:900,color:"#1e293b",textTransform:"uppercase",letterSpacing:"0.4em"}}>
        <span>Logistic PRO v9.3</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
